<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- SEO -->
  <meta name="description" content="Discover Gabrielle Essence Eau De Parfum by CHANEL. A floral, solar and voluptuous fragrance with elegant design.">
  <meta name="keywords" content="perfume, Chanel, Gabrielle Essence, fragrance, product card, frontend mentor">

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="stylesheet" href="styles.css">

  <title>Gabrielle Essence Eau De Parfum | Product Card</title>
</head>

<body>
  <main>
    <article class="product-card">

  <!-- Colonne image -->
  <div class="image-wrapper">
    <img 
      class="product-image" 
      src="images/image-product-mobile.jpg" 
      alt="Gabrielle Essence Eau De Parfum bottle"
    >
  </div>

  <!-- Colonne texte -->
  <div class="product-content">
    <p class="product-category">Perfume</p>
    <h1 class="product-title">Gabrielle Essence Eau De Parfum</h1>
    <p class="product-description">
      A floral, solar and voluptuous interpretation composed by Olivier Polge, 
      Perfumer-Creator for the House of CHANEL.
    </p>

    <div class="prices">
      <span class="product-actual-price">$149.99</span>
      <span class="product-old-price"><s>$169.99</s></span>
    </div>

    <button class="product-cta" aria-label="Add Gabrielle Essence Eau De Parfum to cart">
      Add to Cart
    </button>
  </div>

</article>
  </main>

  <footer class="attribution">
    <p>
      Challenge by 
      <a href="https://www.frontendmentor.io?ref=challenge" target="_blank" rel="noopener">
        Frontend Mentor
      </a>. 
      Coded by <a href="#">HK08</a>.
    </p>
  </footer>

</body>
</html>
